name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # The audio test runs headless, so point SDL at the dummy audio device.
  SDL_AUDIODRIVER: dummy

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # --- macOS: the whole SDL3 family, plus Box2D for the physics check ---
      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3 sdl3_image sdl3_ttf sdl3_mixer box2d

      # --- Linux: build the SDL3 family from source (apt has no SDL3 yet) ---
      # The build is headless, so SDL_UNIX_CONSOLE_BUILD lets it configure
      # without X11 or Wayland, which the tests never need.
      - name: Cache SDL3 (Linux)
        if: runner.os == 'Linux'
        id: cache-sdl
        uses: actions/cache@v4
        with:
          path: ~/sdl3
          key: linux-sdl-3.4.10-image-3.4.4-ttf-3.2.2-mixer-3.2.4-box2d-3.1.1-v2

      - name: Install SDL3 build and runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake ninja-build pkg-config \
            libfreetype-dev libharfbuzz-dev libpng-dev libjpeg-dev libogg-dev libvorbis-dev

      - name: Build SDL3 from source (Linux)
        if: runner.os == 'Linux' && steps.cache-sdl.outputs.cache-hit != 'true'
        run: |
          set -e
          PREFIX="$HOME/sdl3"
          # Clone into a scratch dir, not the repo tree, which already has a src/.
          SRC="$RUNNER_TEMP/depsrc"
          build() {
            local url="$1"; local tag="$2"; shift 2
            rm -rf "$SRC"
            git clone --depth 1 --branch "$tag" "$url" "$SRC"
            cmake -S "$SRC" -B "$SRC/build" -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$PREFIX" -DCMAKE_PREFIX_PATH="$PREFIX" "$@"
            cmake --build "$SRC/build"
            cmake --install "$SRC/build"
          }
          build https://github.com/libsdl-org/SDL        release-3.4.10 -DSDL_UNIX_CONSOLE_BUILD=ON
          build https://github.com/libsdl-org/SDL_image  release-3.4.4
          build https://github.com/libsdl-org/SDL_ttf    release-3.2.2
          build https://github.com/libsdl-org/SDL_mixer  release-3.2.4
          build https://github.com/erincatto/box2d       v3.1.1 \
            -DBOX2D_SAMPLES=OFF -DBOX2D_UNIT_TESTS=OFF -DBOX2D_BENCHMARKS=OFF -DBOX2D_DOCS=OFF
          rm -rf "$SRC"

      - name: Configure SDL3 paths (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "NIM2D_SDL_PREFIX=$HOME/sdl3" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/sdl3/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      # --- Windows: prebuilt MinGW development packages ---
      - name: Install SDL3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $prefix = "C:\sdl3"
          New-Item -ItemType Directory -Force -Path "$prefix\bin", "$prefix\include", "$prefix\lib" | Out-Null
          $pkgs = @(
            @{ repo = "SDL";       tag = "release-3.4.10"; name = "SDL3-3.4.10";      file = "SDL3-devel-3.4.10-mingw.zip" },
            @{ repo = "SDL_image"; tag = "release-3.4.4";  name = "SDL3_image-3.4.4"; file = "SDL3_image-devel-3.4.4-mingw.zip" },
            @{ repo = "SDL_ttf";   tag = "release-3.2.2";  name = "SDL3_ttf-3.2.2";   file = "SDL3_ttf-devel-3.2.2-mingw.zip" },
            @{ repo = "SDL_mixer"; tag = "release-3.2.4";  name = "SDL3_mixer-3.2.4"; file = "SDL3_mixer-devel-3.2.4-mingw.zip" }
          )
          foreach ($p in $pkgs) {
            $url = "https://github.com/libsdl-org/$($p.repo)/releases/download/$($p.tag)/$($p.file)"
            $zip = Join-Path $env:RUNNER_TEMP $p.file
            Invoke-WebRequest -Uri $url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP -Force
            $arch = Join-Path $env:RUNNER_TEMP "$($p.name)\x86_64-w64-mingw32"
            Copy-Item -Recurse -Force "$arch\bin\*"     "$prefix\bin\"
            Copy-Item -Recurse -Force "$arch\include\*" "$prefix\include\"
            Copy-Item -Recurse -Force "$arch\lib\*"     "$prefix\lib\"
          }
          Add-Content -Path $env:GITHUB_ENV  -Value "NIM2D_SDL_PREFIX=C:/sdl3"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\sdl3\bin"

      # Box2D ships no prebuilt Windows package, so build it from source with the
      # MinGW toolchain into the same prefix. Best effort: if it does not build,
      # the physics check below is allowed to fail without failing the job.
      - name: Build Box2D (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          git clone --depth 1 --branch v3.1.1 https://github.com/erincatto/box2d b2src
          cmake -S b2src -B b2src/build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="C:/sdl3" `
            -DBOX2D_SAMPLES=OFF -DBOX2D_UNIT_TESTS=OFF -DBOX2D_BENCHMARKS=OFF -DBOX2D_DOCS=OFF
          cmake --build b2src/build
          cmake --install b2src/build

      - name: Run tests
        run: nimble test -Y

      # The physics module needs Box2D. It is kept out of nimble test (its name
      # does not start with "t") so the core suite stays free of the dependency.
      # Enforced on macOS and Linux; best effort on Windows, where the Box2D
      # source build above may still need tuning.
      - name: Physics smoke test (Box2D)
        continue-on-error: ${{ runner.os == 'Windows' }}
        run: nim c -r --hints:off tests/physics_smoke.nim
