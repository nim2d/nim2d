name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake ninja-build \
            libfreetype-dev libharfbuzz-dev libpng-dev libjpeg-dev pkg-config

      - name: Cache SDL3
        id: cache-sdl3
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: sdl3-3.4.10-image-3.4.4-ttf-3.2.2

      - name: Build SDL3 from source
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          set -e
          build() {
            git clone --depth 1 --branch "$2" "$1" sdlsrc
            cmake -S sdlsrc -B sdlsrc/build -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build sdlsrc/build
            sudo cmake --install sdlsrc/build
            rm -rf sdlsrc
          }
          build https://github.com/libsdl-org/SDL.git        release-3.4.10
          build https://github.com/libsdl-org/SDL_image.git  release-3.4.4
          build https://github.com/libsdl-org/SDL_ttf.git    release-3.2.2

      - name: Refresh linker cache
        run: sudo ldconfig

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Run tests
        run: nimble test -Y
